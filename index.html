<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kingdom</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kingdom">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: black;
    color: gold;
    font-weight: bold; /* ตัวอ้วน */
    overflow: hidden;
}

/* ฝน */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* panel */
.panel {
    position: relative;
    z-index: 1;
    display: none;
    padding: 20px;
    text-align: center;
}

input, button {
    width: 90%;
    padding: 12px;
    margin: 8px;
    border-radius: 12px;
    border: none;
}

button {
    background: gold;
    font-weight: bold;
}

/* toggle */
.toggle {
    display: flex;
    justify-content: space-between;
    background: #111;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
}

.toggle.active {
    box-shadow: 0 0 15px gold;
}

/* DPI */
.slider-box {
    background: #111;
    padding: 12px;
    border-radius: 12px;
    margin-top: 15px;
}
</style>

</head>

<body>

<canvas id="rain"></canvas>

<div id="loading" style="position:fixed;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;font-size:30px;">
👑 Kingdom
</div>

<div class="panel" id="app">

<h2>Kingdom Panel</h2>

<div id="login">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">เข้าสู่ระบบ</button>
</div>

<div id="menu" style="display:none;">

<div class="toggle">
ดูดหัว 100%
<input type="checkbox" onchange="toggle(this)">
</div>

<div class="toggle">
ดูดหัว 85%
<input type="checkbox" onchange="toggle(this)">
</div>

<div class="toggle">
กันแบน 100%
<input type="checkbox" onchange="toggle(this)">
</div>

<div class="slider-box">
<p>DPI: <span id="dpiValue">500</span></p>
<input type="range" min="1" max="1000" value="500" oninput="dpi(this.value)">
</div>

</div>

</div>

<script>
// loading
setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("app").style.display="block";
},1500);

// login
function login(){
let u=user.value;
let p=pass.value;
if(u==="Kingdom" && p==="2001"){
login.style.display="none";
menu.style.display="block";
}else alert("รหัสผิด");
}

// toggle
function toggle(el){
el.parentElement.classList.toggle("active");
}

// DPI
function dpi(val){
document.getElementById("dpiValue").innerText=val;
}

// 🌧️ ฝนตก
let c=document.getElementById("rain");
let ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let rainDrops=Array(200).fill(0);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#0ff";
ctx.font="15px monospace";

rainDrops.forEach((y,i)=>{
let text="|";
let x=i*10;
ctx.fillText(text,x,y);

rainDrops[i]=y>c.height?0:y+10;
});

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
